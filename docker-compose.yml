services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: jobreel
      POSTGRES_USER: jobreel
      POSTGRES_PASSWORD: jobreel
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - jobreel-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobreel -d jobreel"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - jobreel-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - jobreel-net

networks:
  jobreel-net:
    driver: bridge

volumes:
  pgdata:
